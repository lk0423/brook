<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brook · 个人主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f6f9fc;
            padding: 20px;
            background-image: radial-gradient(ellipse at 70% 20%, rgba(200, 220, 255, 0.3) 0%, transparent 60%),
                              radial-gradient(ellipse at 30% 80%, rgba(230, 240, 255, 0.4) 0%, transparent 60%);
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 48px 40px 40px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.06),
                        0 8px 24px rgba(0, 20, 40, 0.04),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 32px 72px rgba(0, 20, 40, 0.08),
                        0 12px 32px rgba(0, 20, 40, 0.05);
        }

        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2b3b5c 0%, #1a2639 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(26, 38, 57, 0.15);
            user-select: none;
            transition: transform 0.2s ease;
        }

        .card:hover .avatar {
            transform: scale(1.02);
        }

        .name {
            font-size: 32px;
            font-weight: 600;
            color: #0f1a2e;
            letter-spacing: -0.3px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .title {
            display: inline-block;
            font-size: 15px;
            font-weight: 500;
            color: #4a5b7a;
            background: rgba(60, 80, 120, 0.08);
            padding: 4px 16px 6px 16px;
            border-radius: 100px;
            letter-spacing: 0.2px;
            margin-bottom: 24px;
            border: 1px solid rgba(60, 80, 120, 0.06);
        }

        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, #b0c4de, #d0dcec);
            border-radius: 4px;
            margin: 18px 0 22px 0;
        }

        .contact {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px 12px 20px;
            background: rgba(245, 248, 252, 0.6);
            border-radius: 60px;
            border: 1px solid rgba(200, 215, 235, 0.25);
            transition: background 0.2s ease, border-color 0.2s ease;
            width: fit-content;
        }

        .contact:hover {
            background: rgba(240, 246, 254, 0.8);
            border-color: rgba(160, 185, 215, 0.3);
        }

        .mail-icon {
            flex-shrink: 0;
            width: 20px;
            height: 16px;
            color: #3e5778;
            opacity: 0.75;
        }

        .mail-icon svg {
            display: block;
            width: 100%;
            height: 100%;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .email {
            font-size: 16px;
            font-weight: 450;
            color: #1f2c45;
            letter-spacing: 0.2px;
            text-decoration: none;
            border-bottom: 1px dashed rgba(60, 80, 120, 0.15);
            padding-bottom: 1px;
            transition: border-color 0.2s ease, color 0.2s ease;
            word-break: break-all;
        }

        .email:hover {
            color: #14213d;
            border-bottom-color: #3e5778;
        }

        .footer-note {
            margin-top: 32px;
            font-size: 13px;
            font-weight: 400;
            color: #8a9bb8;
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(190, 210, 235, 0.2);
            padding-top: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #6fcf97;
            margin-right: 8px;
            box-shadow: 0 0 0 2px rgba(111, 207, 151, 0.15);
            animation: pulse-dot 2.4s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.92); }
        }

        .lang-link {
            font-size: 14px;
            font-weight: 500;
            color: #4a5b7a;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 30px;
            background: rgba(60, 80, 120, 0.06);
            border: 1px solid rgba(60, 80, 120, 0.1);
            transition: background 0.2s, color 0.2s;
        }

        .lang-link:hover {
            background: rgba(60, 80, 120, 0.12);
            color: #1f2c45;
        }

        /* 语言切换内容区 */
        .lang-content {
            display: block;
        }

        .lang-content.hidden {
            display: none;
        }

        .switch-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .switch-btn {
            font-size: 14px;
            font-weight: 500;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(60, 80, 120, 0.15);
            background: transparent;
            color: #6a7b98;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .switch-btn.active {
            background: #1f2c45;
            color: #fff;
            border-color: #1f2c45;
        }

        .switch-btn:hover:not(.active) {
            background: rgba(60, 80, 120, 0.06);
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px 28px;
                border-radius: 28px;
            }
            .avatar {
                width: 72px;
                height: 72px;
                font-size: 30px;
            }
            .name {
                font-size: 26px;
            }
            .contact {
                padding: 10px 14px 10px 16px;
                width: 100%;
            }
            .email {
                font-size: 15px;
            }
            .footer-note {
                flex-direction: column;
                align-items: flex-start;
            }
            .switch-container {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

<div class="card">

    <!-- 头像 -->
    <div class="avatar">B</div>

    <!-- 语言切换按钮 -->
    <div class="switch-container">
        <button class="switch-btn active" id="btnZh" onclick="switchLang('zh')">🇨🇳 中文</button>
        <button class="switch-btn" id="btnEn" onclick="switchLang('en')">🇬🇧 English</button>
    </div>

    <!-- ===== 中文版 ===== -->
    <div id="langZh" class="lang-content">
        <h1 class="name">Brook</h1>
        <div class="title">自由职业者 · 开放合作</div>
        <div class="divider"></div>
        <div class="contact">
            <span class="mail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1.5 4.5L12 12.5L22.5 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    <rect x="1.5" y="2.5" width="21" height="15" rx="2" stroke="currentColor" stroke-width="1.8" />
                </svg>
            </span>
            <a href="mailto:lankun0606@163.com" class="email">lankun0606@163.com</a>
        </div>
        <div class="footer-note">
            <span><span class="status-dot"></span> 开放合作</span>
            <span>基于信任 · 全球协作</span>
        </div>
    </div>

    <!-- ===== 英文版 ===== -->
    <div id="langEn" class="lang-content hidden">
        <h1 class="name">Brook</h1>
        <div class="title">Freelancer · Open to Collaboration</div>
        <div class="divider"></div>
        <div class="contact">
            <span class="mail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1.5 4.5L12 12.5L22.5 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    <rect x="1.5" y="2.5" width="21" height="15" rx="2" stroke="currentColor" stroke-width="1.8" />
                </svg>
            </span>
            <a href="mailto:lankun0606@163.com" class="email">lankun0606@163.com</a>
        </div>
        <div class="footer-note">
            <span><span class="status-dot"></span> Open to Work</span>
            <span>Trust · Global Collaboration</span>
        </div>
    </div>

</div>

<script>
    function switchLang(lang) {
        // 隐藏所有内容
        document.getElementById('langZh').classList.add('hidden');
        document.getElementById('langEn').classList.add('hidden');
        // 显示对应语言
        document.getElementById('lang' + (lang === 'zh' ? 'Zh' : 'En')).classList.remove('hidden');
        // 切换按钮激活状态
        document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
        document.getElementById('btnEn').classList.toggle('active', lang === 'en');
    }
</script>

</body>
</html>
