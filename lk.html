<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brook · 个人介绍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
    <style>
        /* 全局重置 & 字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f6f9fc;
            padding: 20px;
            /* 柔和渐变背景 */
            background-image: radial-gradient(ellipse at 70% 20%, rgba(200, 220, 255, 0.3) 0%, transparent 60%),
                              radial-gradient(ellipse at 30% 80%, rgba(230, 240, 255, 0.4) 0%, transparent 60%);
        }

        /* 卡片——简洁、干净、有呼吸感 */
        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 48px 40px 40px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.06),
                        0 8px 24px rgba(0, 20, 40, 0.04),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 32px 72px rgba(0, 20, 40, 0.08),
                        0 12px 32px rgba(0, 20, 40, 0.05);
        }

        /* 头像 / 首字母标识 */
        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2b3b5c 0%, #1a2639 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(26, 38, 57, 0.15);
            user-select: none;
            transition: transform 0.2s ease;
        }

        .card:hover .avatar {
            transform: scale(1.02);
        }

        /* 姓名 */
        .name {
            font-size: 32px;
            font-weight: 600;
            color: #0f1a2e;
            letter-spacing: -0.3px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        /* 职业标签 */
        .title {
            display: inline-block;
            font-size: 15px;
            font-weight: 500;
            color: #4a5b7a;
            background: rgba(60, 80, 120, 0.08);
            padding: 4px 16px 6px 16px;
            border-radius: 100px;
            letter-spacing: 0.2px;
            margin-bottom: 24px;
            border: 1px solid rgba(60, 80, 120, 0.06);
        }

        /* 分割装饰线 — 极细 */
        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, #b0c4de, #d0dcec);
            border-radius: 4px;
            margin: 18px 0 22px 0;
        }

        /* 联系方式区块 */
        .contact {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px 12px 20px;
            background: rgba(245, 248, 252, 0.6);
            border-radius: 60px;
            border: 1px solid rgba(200, 215, 235, 0.25);
            transition: background 0.2s ease, border-color 0.2s ease;
            width: fit-content;
        }

        .contact:hover {
            background: rgba(240, 246, 254, 0.8);
            border-color: rgba(160, 185, 215, 0.3);
        }

        /* 邮箱图标 (纯CSS) */
        .mail-icon {
            flex-shrink: 0;
            width: 20px;
            height: 16px;
            color: #3e5778;
            opacity: 0.75;
        }

        .mail-icon svg {
            display: block;
            width: 100%;
            height: 100%;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .email {
            font-size: 16px;
            font-weight: 450;
            color: #1f2c45;
            letter-spacing: 0.2px;
            text-decoration: none;
            border-bottom: 1px dashed rgba(60, 80, 120, 0.15);
            padding-bottom: 1px;
            transition: border-color 0.2s ease, color 0.2s ease;
            word-break: break-all;
        }

        .email:hover {
            color: #14213d;
            border-bottom-color: #3e5778;
        }

        /* 底部小提示 —— 极简 */
        .footer-note {
            margin-top: 32px;
            font-size: 13px;
            font-weight: 400;
            color: #8a9bb8;
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(190, 210, 235, 0.2);
            padding-top: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-note span {
            opacity: 0.7;
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #6fcf97;
            margin-right: 8px;
            box-shadow: 0 0 0 2px rgba(111, 207, 151, 0.15);
            animation: pulse-dot 2.4s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.92); }
        }

        /* 响应式微调 */
        @media (max-width: 480px) {
            .card {
                padding: 32px 24px 28px;
                border-radius: 28px;
            }
            .avatar {
                width: 72px;
                height: 72px;
                font-size: 30px;
            }
            .name {
                font-size: 26px;
            }
            .contact {
                padding: 10px 14px 10px 16px;
                width: 100%;
            }
            .email {
                font-size: 15px;
            }
            .footer-note {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- 头像：首字母 B -->
        <div class="avatar" aria-label="Brook 头像">B</div>

        <!-- 姓名 -->
        <h1 class="name">Brook</h1>

        <!-- 职业 -->
        <div class="title">自由职业者</div>

        <!-- 极细装饰线 -->
        <div class="divider"></div>

        <!-- 联系方式：邮箱 -->
        <div class="contact">
            <!-- 简约邮件图标 (纯SVG) -->
            <span class="mail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1.5 4.5L12 12.5L22.5 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    <rect x="1.5" y="2.5" width="21" height="15" rx="2" stroke="currentColor" stroke-width="1.8" />
                </svg>
            </span>
            <a href="mailto:lankun0606@163.com" class="email">
                lankun0606@163.com
            </a>
        </div>

        <!-- 底部：状态 + 年份 -->
        <div class="footer-note">
            <span>
                <span class="status-dot"></span> 开放合作
            </span>
            <span>· 基于信任 ·</span>
        </div>

    </div>

</body>
</html>
